spring.application.name=cafe-api
server.port=8080

# --- MySQL (XAMPP) ---
# Assurez-vous que le module MySQL de XAMPP est demarre avant de lancer le backend
spring.datasource.url=jdbc:mysql://localhost:3306/cafe_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
# Cle secrete HMAC (256 bits min) - a changer en production et a sortir du code source
app.jwt.secret=Y2FmZS1hcHAtc2VjcmV0LWtleS1jaGFuZ2UtbWUtaW4tcHJvZHVjdGlvbi1wbGVhc2UtMjAyNg==
app.jwt.expiration-ms=86400000

# --- Compte GERANT par defaut (seed au premier demarrage) ---
app.seed.gerant.email=admin@cafe.com
app.seed.gerant.password=admin123
app.seed.gerant.nom=Administrateur
